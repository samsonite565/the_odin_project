<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tic Tac Toe Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <header class="flx-rw container justify-ctr align-ctr gap-lap">
        <div class="txt-ctr">
            <h1 class="ft-32">Player 1</h1>
            <h3 class="ft-16">Score</h3>
        </div>
        <h1 class="ft-64">Matches Played</h1>
        <div class="txt-ctr">
            <h1 class="ft-32">Player 2</h1>
            <h3 class="ft-16">Score</h3>
        </div>
    </header>
    <div class="tic-toe-board container grd justify-ctr align-ctr grd-col grd-row" id="toeGrid">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </div>





</body>

</html>
